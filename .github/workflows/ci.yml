name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  test:
    name: cargo test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

      - name: Build
        run: cargo build --locked --all-targets

      - name: Test
        run: cargo test --locked --all-targets

      - name: cargo doc (rustdoc warnings are errors)
        run: cargo doc --no-deps --locked --all-features
        env:
          RUSTDOCFLAGS: "-D warnings"

  playground:
    name: playground codegen + cargo build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Two distinct cache scopes: one for the rublocks compiler itself, one
      # for the generated `playground/dist/` (different Cargo.toml, different
      # dependency graph). Sharing them would invalidate each other on every
      # codegen tweak that touches the dist `Cargo.toml`.
      - name: Cache cargo registry and rublocks target
        uses: Swatinem/rust-cache@v2
        with:
          key: rublocks-bin

      - name: Build rublocks binary
        run: cargo build --locked --release

      - name: rublocks build playground/
        run: ./target/release/rublocks build playground/

      - name: Cache playground/dist/target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: playground/dist
          key: playground-dist

      # Generated projects do not ship a Cargo.lock — codegen wipes
      # `dist/` on every pass and only emits `Cargo.toml` + `src/`. We
      # therefore drop `--locked` for this step (no lockfile to honour);
      # the rust-cache action above still provides hit-rate on the
      # registry between runs.
      - name: cargo build playground/dist/
        working-directory: playground/dist
        run: cargo build

  audit:
    name: cargo audit (advisories)
    runs-on: ubuntu-latest
    # Non-blocking on PRs initially; advisory creates an issue on push to main.
    continue-on-error: false
    # rustsec/audit-check posts a check-run with the advisory list and, on push
    # to main, opens a tracking issue per advisory (idempotent — one issue per
    # RUSTSEC ID, updated if already open). Both require write scope on top of
    # the default read-only token.
    permissions:
      contents: read
      checks: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  deny:
    name: cargo deny (licences + supply chain)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
