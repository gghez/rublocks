name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  test:
    name: cargo test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

      - name: Build
        run: cargo build --locked --all-targets

      - name: Test
        run: cargo test --locked --all-targets

      - name: cargo doc (rustdoc warnings are errors)
        run: cargo doc --no-deps --locked --all-features
        env:
          RUSTDOCFLAGS: "-D warnings"

  audit:
    name: cargo audit (advisories)
    runs-on: ubuntu-latest
    # Non-blocking on PRs initially; advisory creates an issue on push to main.
    continue-on-error: false
    # rustsec/audit-check posts a check-run with the advisory list and, on push
    # to main, opens a tracking issue per advisory (idempotent — one issue per
    # RUSTSEC ID, updated if already open). Both require write scope on top of
    # the default read-only token.
    permissions:
      contents: read
      checks: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  deny:
    name: cargo deny (licences + supply chain)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
