# cargo-deny policy for rublocks.
#
# Starts permissive on purpose: the project is pre-alpha, the dependency
# surface still moves around, and the goal is to catch licence outliers and
# yanked crates without blocking iteration. Tighten once `main` has been
# stable across a few releases.

[graph]
all-features = true

[advisories]
# Fail on any known CVE. New advisories pop up daily; rerun in CI weekly.
version = 2
yanked = "warn"
ignore = []

[licenses]
# Standard permissive set. Any new dependency outside this list requires an
# explicit addition (or an `exceptions` entry) — that way licence creep is a
# visible review event, not a silent merge.
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    "MPL-2.0",
]
confidence-threshold = 0.85

[bans]
multiple-versions = "allow"
wildcards = "deny"
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
